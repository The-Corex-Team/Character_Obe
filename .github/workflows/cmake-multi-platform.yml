name: CMake Cross-Platform CI (Qt6)

on:
  push:
    branches: [ "testing" ]
  pull_request:
    branches: [ "testing" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Install dependencies
      # -------------------------

      - name: Install Qt (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-tools-dev qt6-tools-dev-tools

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install qt

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install qt6-base -y || echo "Qt install may require manual setup depending on environment"

      # -------------------------
      # Install Ninja (optional but recommended)
      # -------------------------

      - name: Install Ninja (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      # -------------------------
      # Configure CMake
      # -------------------------

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      # -------------------------
      # Build
      # -------------------------

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      # -------------------------
      # Test (if you have tests enabled)
      # -------------------------

      - name: Test
        run: ctest --test-dir build --output-on-failure

      # -------------------------
      # Upload artifacts (optional but useful)
      # -------------------------

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: build/
